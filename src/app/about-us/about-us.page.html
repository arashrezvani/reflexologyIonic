<ion-header class="container" style="top: 2%;">
  <ion-toolbar>
    <!-- منوی کشویی سمت چپ -->
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <!-- عنوان در مرکز -->
    <ion-title>
      {{'About_Us' | translate}}
    </ion-title>

    <!-- دکمه خروج سمت راست -->
    <ion-buttons slot="end">
      <ion-button (click)="exitApp()">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
      <!-- <ion-buttons shape="round" color="success"  >
        <ion-back-button defaultHref="/" [text]="'Back' | translate"></ion-back-button>
      </ion-buttons> -->
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="container content-area  font-iransans">

  
  <ion-item-divider></ion-item-divider>
  <ion-item>
    <ion-label color="Dark Gray" class="center-text">
      <ion-item-divider></ion-item-divider>
      <h2 class="center-text">اللهم صلی علی محمد و آل محمد و عجل فرجهم</h2>
      <h2 class="center-text">اللهم بارک لمولانا صاحب الزمان(عج)</h2>
    </ion-label>
  </ion-item>
  <ion-item-divider></ion-item-divider>

</ion-content>

<ion-footer class="container"  class="custom-footer">
  <ion-item>
    <ion-label color="success" class="center-text">
      <h2 class="center-text" class="text-danger">{{'BonyanGroup' | translate}}</h2>
    </ion-label>
  </ion-item>
</ion-footer>
